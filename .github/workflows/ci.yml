name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check if Makefile exists
        id: check
        run: |
          if [ -f Makefile ] && ls src/*.c src/**/*.c 2>/dev/null | head -1 > /dev/null; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "ソースコードがまだないのでスキップ"
          fi

      - name: Install readline
        if: steps.check.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev

      - name: Build
        if: steps.check.outputs.ready == 'true'
        run: make

      - name: Build clean check (no relink)
        if: steps.check.outputs.ready == 'true'
        run: |
          make
          make 2>&1 | tee build_output.txt
          if grep -q "cc " build_output.txt; then
            echo "::error::Makefile relinks unnecessarily"
            exit 1
          fi
          echo "No unnecessary relink"

  norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if source files exist
        id: check
        run: |
          if find src includes -name '*.c' -o -name '*.h' 2>/dev/null | head -1 | grep -q .; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo ".c/.h ファイルがまだないのでスキップ"
          fi

      - name: Install norminette
        if: steps.check.outputs.ready == 'true'
        run: pip install norminette --break-system-packages

      - name: Run norminette
        if: steps.check.outputs.ready == 'true'
        run: |
          echo "::group::norminette output"
          norminette src/ includes/ 2>&1 | tee norm_output.txt
          echo "::endgroup::"
          if grep -q "Error" norm_output.txt; then
            echo ""
            echo "Norm violations found:"
            grep "Error" norm_output.txt
            exit 1
          fi
          echo "Norminette passed"

  valgrind:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check if binary can be built
        id: check
        run: |
          if [ -f Makefile ] && ls src/*.c src/**/*.c 2>/dev/null | head -1 > /dev/null; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "ソースコードがまだないのでスキップ"
          fi

      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev valgrind

      - name: Build
        if: steps.check.outputs.ready == 'true'
        run: make

      - name: Run valgrind
        if: steps.check.outputs.ready == 'true'
        run: |
          echo 'echo hello
          ls
          pwd
          export FOO=bar
          env | grep FOO
          unset FOO
          echo $?
          exit' | valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=42 \
            --suppressions=readline.supp \
            ./minishell 2>&1 | tee valgrind_output.txt

          if grep -q "definitely lost: [^0]" valgrind_output.txt; then
            REAL_LEAKS=$(grep -A 20 "definitely lost" valgrind_output.txt | grep -v -e "readline" -e "add_history" -e "rl_" | grep -c "minishell\|src/") || true
            if [ "$REAL_LEAKS" -gt 0 ]; then
              echo "Memory leaks detected in minishell code"
              exit 1
            fi
          fi
          echo "No memory leaks (readline leaks excluded)"

      - name: Upload valgrind report
        if: always() && steps.check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: valgrind_output.txt
